*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
#app{padding:1rem 0;max-width:680px}

.header{margin-bottom:1.5rem}

.badge-sa{background:#FAEEDA;color:#854F0B}
.q-num{font-size:13px;color:var(--color-text-secondary)}

.q-text{font-size:16px;font-weight:500;color:var(--color-text-primary);line-height:1.6;margin-bottom:1.25rem}

.choices{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.choice{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:12px 16px;font-size:14px;color:var(--color-text-primary);cursor:pointer;text-align:left;transition:border-color 0.15s,background 0.15s;line-height:1.5}
.choice:hover:not(:disabled){background:var(--color-background-secondary);border-color:var(--color-border-primary)}
.choice.correct{background:#E1F5EE;border-color:#1D9E75;color:#0F6E56}
.choice.wrong{background:#FCEBEB;border-color:#E24B4A;color:#A32D2D}
.choice.reveal-correct{background:#E1F5EE;border-color:#1D9E75;color:#0F6E56}

.ox-btns{display:flex;gap:12px;margin-bottom:1rem}
.ox-btn{flex:1;padding:14px;font-size:20px;font-weight:500;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);cursor:pointer;color:var(--color-text-primary);transition:all 0.15s}
.ox-btn:hover:not(:disabled){background:var(--color-background-secondary)}
.ox-btn.correct{background:#E1F5EE;border-color:#1D9E75;color:#0F6E56}
.ox-btn.wrong{background:#FCEBEB;border-color:#E24B4A;color:#A32D2D}
.ox-btn.reveal-correct{background:#E1F5EE;border-color:#1D9E75;color:#0F6E56}
.ox-btn:disabled{cursor:default}

.sa-wrap{margin-bottom:1rem}
.sa-wrap input{width:100%;padding:12px 14px;font-size:14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.sa-wrap input:focus{outline:none;border-color:#1D9E75}
.sa-hint{font-size:12px;color:var(--color-text-secondary);margin-top:6px}

.explanation{background:var(--color-background-secondary);border-radius:var(--border-radius-md);border-left:3px solid #1D9E75;padding:14px 16px;margin-bottom:1.25rem;display:none}
.explanation.show{display:block}
.explanation .ex-label{font-size:11px;font-weight:500;color:#0F6E56;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em}
.explanation p{font-size:13px;color:var(--color-text-secondary);line-height:1.7}
.explanation .ans-line{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px}

.result-badge{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;padding:6px 12px;border-radius:20px;margin-bottom:1rem}
.result-badge.correct-badge{background:#E1F5EE;color:#0F6E56}
.result-badge.wrong-badge{background:#FCEBEB;color:#A32D2D}

.btn-next{width:100%;padding:13px;font-size:14px;font-weight:500;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;color:var(--color-text-primary);transition:all 0.15s;display:none}

.btn-submit{width:100%;padding:13px;font-size:14px;font-weight:500;background:#1D9E75;border:none;border-radius:var(--border-radius-md);cursor:pointer;color:#fff;display:none}

.btn-submit:hover{background:#0F6E56}

.score-card{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:2rem;text-align:center;margin-bottom:1.5rem}

.score-sub{font-size:14px;color:var(--color-text-secondary);margin-top:8px}
.score-msg{font-size:15px;color:var(--color-text-primary);margin-top:16px;font-weight:500}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem}
.stat-cell{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem;text-align:center}
.stat-n{font-size:22px;font-weight:500;color:var(--color-text-primary)}

.review-item{background:var(--color-background-secondary);border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);padding:14px 16px}

.review-item .ri-ans{font-size:12px;color:#A32D2D;margin-bottom:2px}
.review-item .ri-correct{font-size:12px;color:#0F6E56;margin-bottom:6px}

let questions = [];
let currentIdx = 0;
let answers = [];
let answered = false;

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function startQuiz(){
  questions = shuffle(ALL_QUESTIONS);
  currentIdx = 0;
  answers = [];
  showScreen('quiz-screen');
  renderQuestion();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderQuestion(){
  const q = questions[currentIdx];
  answered = false;
  const total = questions.length;
  const pct = Math.round((currentIdx/total)*100);
  document.getElementById('progress-fill').style.width = pct+'%';

  const typeMap = {ox:'O/X', mc:'객관식', sa:'단답형'};
  const badgeClass = {ox:'badge-ox', mc:'badge-mc', sa:'badge-sa'};
  const tb = document.getElementById('type-badge');
  tb.textContent = typeMap[q.type];
  tb.className = 'badge ' + badgeClass[q.type];

  document.getElementById('q-num-label').textContent = (currentIdx+1)+' / '+total+'문제';
  document.getElementById('unit-label').textContent = q.unit + ' · ' + q.sub;
  document.getElementById('q-text').textContent = q.q;

  document.getElementById('explanation').className = 'explanation';
  document.getElementById('result-badge-wrap').innerHTML = '';
  document.getElementById('btn-next').className = 'btn-next';
  document.getElementById('btn-submit').className = 'btn-submit';

  const body = document.getElementById('q-body');
  body.innerHTML = '';

  if(q.type === 'ox'){
    const wrap = document.createElement('div');
    wrap.className = 'ox-btns';
    ['O','X'].forEach(v=>{
      const btn = document.createElement('button');
      btn.className = 'ox-btn';
      btn.textContent = v;
      btn.onclick = ()=>handleOX(v, btn);
      wrap.appendChild(btn);
    });
    body.appendChild(wrap);
  } else if(q.type === 'mc'){
    const wrap = document.createElement('div');
    wrap.className = 'choices';
    q.choices.forEach((c,i)=>{
      const btn = document.createElement('button');
      btn.className = 'choice';
      btn.textContent = c;
      btn.onclick = ()=>handleMC(i, btn, wrap);
      wrap.appendChild(btn);
    });
    body.appendChild(wrap);
  } else {
    const wrap = document.createElement('div');
    wrap.className = 'sa-wrap';
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.placeholder = '답을 입력하세요';
    inp.id = 'sa-input';
    const hint = document.createElement('div');
    hint.className = 'sa-hint';
    hint.textContent = '핵심 개념을 포함하여 답하세요';
    wrap.appendChild(inp);
    wrap.appendChild(hint);
    body.appendChild(wrap);

    const subBtn = document.createElement('button');
    subBtn.className = 'btn-submit show';
    subBtn.id = 'sa-submit';
    subBtn.textContent = '답안 제출';
    subBtn.style.background='#1D9E75';
    subBtn.style.color='#fff';
    subBtn.style.border='none';
    subBtn.style.borderRadius='var(--border-radius-md)';
    subBtn.style.padding='12px';
    subBtn.style.width='100%';
    subBtn.style.fontSize='14px';
    subBtn.style.fontWeight='500';
    subBtn.style.cursor='pointer';
    subBtn.style.marginBottom='1rem';
    subBtn.onclick = ()=>handleSA();
    body.appendChild(subBtn);

    inp.addEventListener('keydown', e=>{if(e.key==='Enter') handleSA();});
  }
}

function handleOX(val, clickedBtn){
  if(answered) return;
  answered = true;
  const q = questions[currentIdx];
  const isCorrect = val === q.correct;
  const allBtns = clickedBtn.parentElement.querySelectorAll('.ox-btn');
  allBtns.forEach(b=>{
    b.disabled=true;
    if(b.textContent === q.correct) b.classList.add('reveal-correct');
  });
  if(!isCorrect) clickedBtn.classList.add('wrong');
  showFeedback(isCorrect, q);
  answers.push({q, isCorrect, userAnswer: val});
  showNextBtn();
}

function handleMC(idx, clickedBtn, wrap){
  if(answered) return;
  answered = true;
  const q = questions[currentIdx];
  const isCorrect = idx === q.correct;
  wrap.querySelectorAll('.choice').forEach((b,i)=>{
    b.disabled=true;
    if(i===q.correct) b.classList.add('reveal-correct');
  });
  if(!isCorrect) clickedBtn.classList.add('wrong');
  showFeedback(isCorrect, q);
  answers.push({q, isCorrect, userAnswer: q.choices[idx]});
  showNextBtn();
}

function handleSA(){
  if(answered) return;
  const q = questions[currentIdx];
  const inp = document.getElementById('sa-input');
  if(!inp || inp.value.trim()==='') return;
  answered = true;
  const val = inp.value.trim();
  const hit = q.keywords.some(kw=>val.includes(kw));
  inp.disabled = true;
  const saBtn = document.getElementById('sa-submit');
  if(saBtn) saBtn.style.display='none';
  showFeedback(hit, q);
  answers.push({q, isCorrect: hit, userAnswer: val});
  showNextBtn();
}

function showFeedback(isCorrect, q){
  const ex = document.getElementById('explanation');
  document.getElementById('ans-line').textContent = q.answerLine;
  document.getElementById('ex-text').textContent = q.explanation;
  ex.className = 'explanation show';
  if(isCorrect) ex.style.borderLeftColor='#1D9E75';
  else ex.style.borderLeftColor='#E24B4A';

  const rb = document.getElementById('result-badge-wrap');
  rb.innerHTML = isCorrect
    ? '<div class="result-badge correct-badge"><i class="ti ti-check" aria-hidden="true"></i> 정답입니다!</div>'
    : '<div class="result-badge wrong-badge"><i class="ti ti-x" aria-hidden="true"></i> 오답입니다</div>';
}

function showNextBtn(){
  const isLast = currentIdx === questions.length - 1;
  if(isLast){
    document.getElementById('btn-submit').className = 'btn-submit show';
  } else {
    document.getElementById('btn-next').className = 'btn-next show';
  }
}

function nextQ(){
  currentIdx++;
  renderQuestion();
}

function submitQuiz(){
  const total = answers.length;
  const correct = answers.filter(a=>a.isCorrect).length;
  const pct = Math.round((correct/total)*100);

  document.getElementById('score-pct').textContent = pct+'%';
  document.getElementById('score-detail').textContent = total+'문제 중 '+correct+'문제 정답';

  let msg = '';
  if(pct>=90) msg='완벽해요! 3·4단원을 정말 잘 이해하고 있네요 🎉';
  else if(pct>=70) msg='잘 하고 있어요! 틀린 부분을 다시 복습해봐요.';
  else if(pct>=50) msg='조금 더 공부가 필요해요. 해설을 꼼꼼히 읽어봐요.';
  else msg='개념을 다시 한번 정리해봐요. 할 수 있어요!';
  document.getElementById('score-msg').textContent = msg;

  const oxA = answers.filter(a=>a.q.type==='ox');
  const mcA = answers.filter(a=>a.q.type==='mc');
  const saA = answers.filter(a=>a.q.type==='sa');
  const fmtStat = (arr)=>{
    const c=arr.filter(a=>a.isCorrect).length;
    return c+'/'+arr.length;
  };
  document.getElementById('stat-ox').textContent = fmtStat(oxA);
  document.getElementById('stat-mc').textContent = fmtStat(mcA);
  document.getElementById('stat-sa').textContent = fmtStat(saA);

  const wrong = answers.filter(a=>!a.isCorrect);
  const rl = document.getElementById('review-list');
  if(wrong.length===0){
    rl.innerHTML = '<div style="text-align:center;padding:1.5rem;color:var(--color-text-secondary);font-size:14px">틀린 문제가 없어요! 완벽합니다 🎉</div>';
  } else {
    rl.innerHTML = wrong.map(a=>`
      <div class="review-item">
        <div class="ri-q">${a.q.q.replace(/\n/g,'<br>')}</div>
        <div class="ri-ans">내 답: ${a.userAnswer || '(미입력)'}</div>
        <div class="ri-correct">${a.q.answerLine}</div>
        <div class="ri-ex">${a.q.explanation.replace(/\n/g,'<br>')}</div>
      </div>
    `).join('');
  }

  dbClient.from('quiz_results').insert({
    total_questions: total,
    correct_answers: correct,
    score_pct: pct,
    ox_correct: oxA.filter(a=>a.isCorrect).length,
    ox_total: oxA.length,
    mc_correct: mcA.filter(a=>a.isCorrect).length,
    mc_total: mcA.length,
    sa_correct: saA.filter(a=>a.isCorrect).length,
    sa_total: saA.length
  });

  showScreen('result-screen');
}

function restartQuiz(){
  startQuiz();
}
</script>
